<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
  <g transform="translate(10, 10)">
    <!-- Globe / Circle Base -->
    <circle cx="30" cy="30" r="25" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.3"/>
    <path d="M 5 30 A 25 25 0 0 0 55 30" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.5"/>
    <path d="M 30 5 A 25 25 0 0 0 30 55" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.5"/>
    
    <!-- Medical Cross -->
    <circle cx="30" cy="45" r="8" fill="#1e3a8a"/>
    <path d="M 28 42 h 4 v 2 h 2 v 2 h -2 v 2 h -4 v -2 h -2 v -2 h 2 z" fill="#ffffff"/>
    
    <!-- Caduceus / Staff -->
    <line x1="30" y1="15" x2="30" y2="37" stroke="#1e3a8a" stroke-width="3" stroke-linecap="round"/>
    <circle cx="30" cy="12" r="3" fill="#1e3a8a"/>
    <path d="M 20 22 Q 30 15 40 22 Q 30 30 20 22 Z" fill="#0ea5e9" opacity="0.8"/>
    <path d="M 23 28 Q 30 23 37 28 Q 30 34 23 28 Z" fill="#0ea5e9" opacity="0.8"/>
    
    <!-- Airplane Swoosh -->
    <path d="M 10 40 Q 30 65 60 25" fill="none" stroke="#0ea5e9" stroke-width="4" stroke-linecap="round"/>
    <!-- Airplane -->
    <path d="M 58 22 L 64 16 L 66 17 L 68 15 L 65 10 L 61 14 L 56 12 L 58 17 L 54 21 Z" fill="#0ea5e9" transform="rotate(20 60 20)"/>
  </g>
  
  <!-- Text -->
  <text x="80" y="42" font-family="sans-serif" font-weight="800" font-size="32" fill="#1e3a8a">DreamMed</text>
  <text x="82" y="62" font-family="sans-serif" font-weight="600" font-size="14" fill="#0ea5e9" letter-spacing="4">ABROAD</text>
  <line x1="80" y1="70" x2="260" y2="70" stroke="#cbd5e1" stroke-width="1"/>
</svg>
